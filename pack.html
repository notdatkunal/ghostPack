<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pack PDF Bundle</title>
    <link rel="stylesheet" href="shared.css">
    <style>
      body {
        background: radial-gradient(circle at top, rgba(56, 139, 253, 0.13), transparent 32%),
          linear-gradient(180deg, #020617 0%, #09111e 100%);
      }

      .file-info {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pack PDF Bundle</h1>
      <p>Combine a PDF and an archive into one bundled PDF file. The archive is appended after a marker so it can be extracted later.</p>
      
      <div id="error"></div>
      
      <label for="pdfInput">Select PDF file</label>
      <input type="file" id="pdfInput" accept="application/pdf" />
      <div class="file-info" id="pdfInfo"></div>
      
      <label for="archiveInput">Select archive file</label>
      <input type="file" id="archiveInput" />
      <div class="file-info" id="archiveInfo"></div>
      
      <button onclick="pack()" data-original-text="Create Bundled PDF">Create Bundled PDF</button>
      
      <div class="info" id="success">
        ✓ Successfully created <code id="outputName"></code>
      </div>
      
      <footer>
        Supported archives: ZIP, TAR, TAR.GZ, 7Z, RAR, etc.
        <br>Max file size: 2GB
      </footer>
    </main>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="utils.js"></script>
    <script>
      const MAX_FILE_SIZE = 2 * 1024 * 1024 * 1024; // 2GB

      // Show file info when selected
      document.getElementById("pdfInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          document.getElementById("pdfInfo").textContent = 
            `${file.name} (${formatSize(file.size)})`;
        }
      });

      document.getElementById("archiveInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          document.getElementById("archiveInfo").textContent = 
            `${file.name} (${formatSize(file.size)})`;
        }
      });

      async function pack() {
        const pdfInput = document.getElementById("pdfInput");
const zipInput = document.getElementById("archiveInput");

const pdfFile = pdfInput.files[0];
const zipFile = zipInput.files[0];
  const pdfBytes = await pdfFile.arrayBuffer();
  const zipBytes = await zipFile.arrayBuffer();

  const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);

  await pdfDoc.attach(zipBytes, zipFile.name, {
    mimeType: "application/zip",
    description: "ghostPack embedded archive",
  });

  const newPdf = await pdfDoc.save();
  const outputFilename = pdfFile.name.replace(/\.pdf$/i, "") + "-bundled.pdf";
  download(newPdf, outputFilename);

  document.getElementById("success").style.display = "block";
  document.getElementById("outputName").textContent = outputFilename;
}
      // Allow Enter key to submit
      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && document.querySelector("button") && !document.querySelector("button").disabled) {
          pack();
        }
      });
    </script>
  </body>
</html>
