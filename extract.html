<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extract Bundled Archive</title>
    <link rel="stylesheet" href="shared.css">
    <style>
      body {
        background: radial-gradient(circle at bottom right, rgba(56, 139, 253, 0.14), transparent 30%),
          linear-gradient(180deg, #020617 0%, #09111e 100%);
      }

      .file-info {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Extract Bundled Archive</h1>
      <p>Select a bundled PDF file and extract the appended archive. The archive will be downloaded.</p>
      
      <div id="error"></div>
      
      <label for="pdfExtract">Select bundled PDF</label>
      <input type="file" id="pdfExtract" accept="application/pdf" />
      <div class="file-info" id="pdfInfo"></div>
      
      <button onclick="extract()" data-original-text="Extract Archive">Extract Archive</button>
      
      <div class="info" id="success">
        ✓ Successfully extracted <code id="outputName"></code> (size: <span id="outputSize"></span>)
      </div>
      
      <footer>
        Use this tool to extract archives from PDFs created with the Pack PDF tool.
      </footer>
    </main>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="utils.js"></script>
    <script>
      // Show file info when selected
      document.getElementById("pdfExtract").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          document.getElementById("pdfInfo").textContent = 
            `${file.name} (${formatSize(file.size)})`;
        }
      });

      /**
       * Fast binary search for marker in Uint8Array
       * Much faster than nested loop for large files
       */
      function findMarkerIndex(buffer, markerHeader) {
        const magic = markerHeader.slice(0, 9);
        
        // Use the magic bytes (first 9 bytes) to search
        for (let i = 0; i <= buffer.length - magic.length; i++) {
          let found = true;
          for (let j = 0; j < magic.length; j++) {
            if (buffer[i + j] !== magic[j]) {
              found = false;
              break;
            }
          }
          
          if (found) {
            // Verify version byte matches (byte 9)
            if (i + 9 < buffer.length && buffer[i + 9] === MARKER.version) {
              return i;
            }
          }
        }
        
        return -1;
      }

  async function extract() {
  const pdfInput = document.getElementById("pdfExtract");
  const pdfFile = pdfInput.files[0];
  if (!pdfFile) {
    showError("Please select a bundled PDF first.");
    return;
  }

  clearError();
  const pdfBytes = await pdfFile.arrayBuffer();
  const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);

  const names = pdfDoc.catalog.has(PDFLib.PDFName.of("Names"))
    ? pdfDoc.catalog.lookup(PDFLib.PDFName.of("Names"), PDFLib.PDFDict)
    : null;

  if (!names || !names.has(PDFLib.PDFName.of("EmbeddedFiles"))) {
    showError("No embedded archive found in this PDF.");
    return;
  }

  const embeddedFiles = names.lookup(PDFLib.PDFName.of("EmbeddedFiles"), PDFLib.PDFDict);
  const efNames = embeddedFiles.lookup(PDFLib.PDFName.of("Names"), PDFLib.PDFArray);

  if (!efNames || efNames.size() < 2) {
    showError("No embedded archive entries found.");
    return;
  }

  const fileNameObj = efNames.get(0);
  const outputFilename = fileNameObj.decodeText
    ? fileNameObj.decodeText()
    : pdfFile.name.replace(/\.pdf$/i, "") + "-extracted.zip";

  const fileSpecRef = efNames.get(1);
  const fileSpec = pdfDoc.context.lookup(fileSpecRef, PDFLib.PDFDict);
  const efDict = fileSpec.lookup(PDFLib.PDFName.of("EF"), PDFLib.PDFDict);
  const fileStreamRef = efDict.lookup(PDFLib.PDFName.of("F"));
  const fileStream = pdfDoc.context.lookup(fileStreamRef, PDFLib.PDFStream);
  const fileBytes = fileStream.asUint8Array();

  download(fileBytes, outputFilename);
  document.getElementById("success").style.display = "block";
  document.getElementById("outputName").textContent = outputFilename;
  document.getElementById("outputSize").textContent = formatSize(fileBytes.byteLength || fileBytes.length || 0);
}
      // Allow Enter key to submit
      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && document.querySelector("button") && !document.querySelector("button").disabled) {
          extract();
        }
      });
    </script>
  </body>
</html>
